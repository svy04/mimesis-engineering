name: Reference Pack
description: Suggest a new reference pack or improve an existing one.
title: "[Reference Pack]: "
labels: ["reference-pack"]
body:
  - type: input
    id: domain
    attributes:
      label: Domain
      description: What domain should this pack cover?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: When should builders use this pack?
    validations:
      required: true
  - type: textarea
    id: candidate-references
    attributes:
      label: Candidate references
      description: Link to candidate references. Do not include copied protected content.
    validations:
      required: true
  - type: textarea
    id: source-quality
    attributes:
      label: Source quality
      description: Which references are official docs, source repos, papers, patents, standards, public artifacts, or secondary routing material?
    validations:
      required: true
  - type: textarea
    id: what-makes-strong
    attributes:
      label: What makes them strong?
      description: Name the structure, not the surface.
    validations:
      required: true
  - type: textarea
    id: what-not-to-copy
    attributes:
      label: What not to copy
      description: Identify surface elements, claims, or proof that should not be copied.
    validations:
      required: true
